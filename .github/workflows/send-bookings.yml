name: Send Bookings (Thursday 7 AM Chile)

on:
  schedule:
    # 10:00 UTC Thursday = 6:00 AM Chile (GMT-4) + ~1h retraso típico de GitHub Actions = ~7:00 AM Chile
    - cron: '0 10 * * 4'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-bookings endpoint
        run: |
          curl --fail --show-error --silent \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/send-bookings"
