<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas de Tenis</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --background: 0 0% 100%;
      --foreground: 240 10% 3.9%;
      --card: 0 0% 100%;
      --card-foreground: 240 10% 3.9%;
      --muted: 240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --border: 240 5.9% 90%;
      --input: 240 5.9% 90%;
      --ring: 240 5.9% 10%;
      --primary: 240 5.9% 10%;
      --primary-foreground: 0 0% 98%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 0 0% 98%;
      --radius: 0.5rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: hsl(var(--muted));
      color: hsl(var(--foreground));
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 580px; margin: 0 auto; padding: 32px 16px; }

    /* Card */
    .card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 2px 0 rgba(0,0,0,.03);
    }

    .card-header {
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card-description {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      margin-top: 2px;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* Buttons */
    button {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s ease;
      border: none;
      line-height: 1;
    }

    button:disabled { opacity: 0.5; pointer-events: none; }

    .btn-primary {
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      height: 36px;
      padding: 0 16px;
      width: 100%;
    }

    .btn-primary:hover { opacity: 0.9; }

    .btn-outline {
      background: transparent;
      border: 1px solid hsl(var(--border));
      color: hsl(var(--foreground));
      height: 32px;
      padding: 0 12px;
      font-size: 12px;
    }

    .btn-outline:hover { background: hsl(var(--muted)); }

    .btn-destructive {
      background: hsl(var(--destructive));
      color: hsl(var(--destructive-foreground));
      height: 28px;
      padding: 0 10px;
      font-size: 12px;
    }

    .btn-destructive:hover { opacity: 0.9; }

    .btn-ghost {
      background: transparent;
      color: hsl(var(--muted-foreground));
      height: 32px;
      padding: 0 12px;
      font-size: 12px;
    }

    .btn-ghost:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
    .btn-ghost.active { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }

    /* Inputs */
    input {
      display: flex;
      width: 100%;
      height: 36px;
      border-radius: var(--radius);
      border: 1px solid hsl(var(--input));
      background: transparent;
      padding: 0 12px;
      font-size: 13px;
      color: hsl(var(--foreground));
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: hsl(var(--ring));
      box-shadow: 0 0 0 2px hsl(var(--ring) / 0.1);
    }

    input::placeholder { color: hsl(var(--muted-foreground)); }

    label {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      display: block;
    }

    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
    }

    .form-group { flex: 1; }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .badge-pending {
      background: hsl(45 93% 94%);
      color: hsl(32 95% 30%);
      border-color: hsl(45 80% 80%);
    }

    .badge-sent {
      background: hsl(142 76% 94%);
      color: hsl(144 61% 20%);
      border-color: hsl(142 60% 80%);
    }

    .badge-failed {
      background: hsl(0 93% 94%);
      color: hsl(0 70% 35%);
      border-color: hsl(0 70% 85%);
    }

    /* Reservation list */
    .reservation-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid hsl(var(--border));
    }

    .reservation-item:last-child { border-bottom: none; }
    .reservation-item:first-child { padding-top: 0; }

    .reservation-info { flex: 1; min-width: 0; }

    .reservation-date {
      font-weight: 600;
      font-size: 13px;
      letter-spacing: -0.01em;
    }

    .reservation-time {
      color: hsl(var(--muted-foreground));
      font-size: 12px;
      margin-top: 1px;
      font-variant-numeric: tabular-nums;
    }

    .reservation-sender {
      color: hsl(var(--muted-foreground));
      font-size: 12px;
      margin-top: 1px;
    }

    .reservation-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      color: hsl(var(--muted-foreground));
      padding: 32px 0;
      font-size: 13px;
    }

    .filter-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    /* Separator */
    .separator {
      height: 1px;
      background: hsl(var(--border));
      margin: 16px 0;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      color: hsl(var(--primary-foreground));
      background: hsl(var(--foreground));
      border: 1px solid hsl(var(--border));
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: hsl(var(--destructive));
    }

    /* Login */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .login-card {
      width: 100%;
      max-width: 360px;
    }

    .login-card .card { text-align: center; }

    .login-card .form-group { text-align: left; margin-bottom: 16px; }

    .login-message {
      margin-top: 16px;
      font-size: 13px;
      color: hsl(144 61% 20%);
      background: hsl(142 76% 94%);
      border: 1px solid hsl(142 60% 80%);
      padding: 10px 14px;
      border-radius: var(--radius);
      display: none;
    }

    #app { display: none; }
    #login { display: none; }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login" class="login-container">
    <div class="login-card">
      <div class="card">
        <div class="card-header">
          <div class="card-title" style="font-size:20px;">Reservas de Tenis</div>
          <div class="card-description">Ingresa tu email para recibir un link de acceso</div>
        </div>
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="tu@email.com" required>
          </div>
          <button type="submit" class="btn-primary" id="login-btn">Enviar link</button>
        </form>
        <div class="login-message" id="login-message">
          Revisa tu email. Te enviamos un link de acceso.
        </div>
      </div>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="container">
    <header>
      <h1>Reservas de Tenis</h1>
      <button class="btn-outline" id="logout-btn">Salir</button>
    </header>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Nueva reserva</div>
      </div>
      <form id="reservation-form">
        <div class="form-row">
          <div class="form-group">
            <label for="date">Fecha</label>
            <input type="date" id="date" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="start">Inicio</label>
            <input type="time" id="start" value="20:00" required>
          </div>
          <div class="form-group">
            <label for="end">Fin</label>
            <input type="time" id="end" value="22:00" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="name">Nombre (opcional)</label>
            <input type="text" id="name" placeholder="Tu nombre">
          </div>
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">Crear reserva</button>
      </form>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Reservas</div>
      </div>
      <div class="filter-bar">
        <button class="btn-ghost active" data-filter="all">Todas</button>
        <button class="btn-ghost" data-filter="pending">Pendientes</button>
        <button class="btn-ghost" data-filter="sent">Enviadas</button>
        <button class="btn-ghost" data-filter="failed">Fallidas</button>
      </div>
      <div id="reservations-list">
        <div class="empty-state">Cargando...</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SUPABASE_URL = 'https://ahmirzbpttptlfwvinen.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFobWlyemJwdHRwdGxmd3ZpbmVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMTUzOTAsImV4cCI6MjA3ODc5MTM5MH0.AyD-x9gihBBaZkmj0fQ_IsczgREm-L0hHiIij9E12H4';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentFilter = 'all';
    let allReservations = [];

    // --- Auth ---
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        showApp();
      } else {
        document.getElementById('login').style.display = 'flex';
      }

      sb.auth.onAuthStateChange((event, session) => {
        if (session) {
          showApp();
        } else {
          document.getElementById('app').style.display = 'none';
          document.getElementById('login').style.display = 'flex';
        }
      });
    }

    function showApp() {
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      fetchReservations();
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.origin }
      });

      if (error) {
        showToast(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Enviar link';
      } else {
        document.getElementById('login-message').style.display = 'block';
        btn.textContent = 'Link enviado';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
    });

    // --- Reservations ---
    function getNextMonday() {
      const d = new Date();
      const day = d.getDay();
      const diff = day === 0 ? 1 : 8 - day;
      d.setDate(d.getDate() + diff);
      return d.toISOString().split('T')[0];
    }

    document.getElementById('date').value = getNextMonday();

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      return date.toLocaleDateString('es-CL', {
        weekday: 'short',
        day: 'numeric',
        month: 'short',
        year: 'numeric'
      });
    }

    function formatTime(t) {
      return t.substring(0, 5);
    }

    async function fetchReservations() {
      const { data, error } = await sb
        .from('reservations')
        .select('*')
        .order('reservation_date', { ascending: false })
        .order('initial_time', { ascending: false });

      if (error) {
        showToast('Error al cargar reservas', 'error');
        return;
      }

      allReservations = data || [];
      renderReservations();
    }

    function renderReservations() {
      const list = document.getElementById('reservations-list');
      const filtered = currentFilter === 'all'
        ? allReservations
        : allReservations.filter(r => r.status === currentFilter);

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state">No hay reservas</div>';
        return;
      }

      list.innerHTML = filtered.map(r => `
        <div class="reservation-item">
          <div class="reservation-info">
            <div class="reservation-date">${formatDate(r.reservation_date)}</div>
            <div class="reservation-time">${formatTime(r.initial_time)} - ${formatTime(r.end_time)}</div>
            ${r.sender_name ? `<div class="reservation-sender">${escapeHtml(r.sender_name)}</div>` : ''}
          </div>
          <div class="reservation-actions">
            <span class="badge badge-${r.status}">${r.status}</span>
            ${r.status === 'pending' ? `<button class="btn-destructive" onclick="deleteReservation('${r.id}')">Eliminar</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('reservation-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;

      const { error } = await sb
        .from('reservations')
        .insert({
          reservation_date: document.getElementById('date').value,
          initial_time: document.getElementById('start').value,
          end_time: document.getElementById('end').value,
          sender_name: document.getElementById('name').value || null,
          status: 'pending'
        });

      if (error) {
        showToast(error.message, 'error');
      } else {
        showToast('Reserva creada');
        document.getElementById('name').value = '';
        fetchReservations();
      }

      btn.disabled = false;
    });

    async function deleteReservation(id) {
      if (!confirm('Eliminar esta reserva?')) return;

      const { error } = await sb
        .from('reservations')
        .delete()
        .eq('id', id);

      if (error) {
        showToast(error.message, 'error');
      } else {
        showToast('Reserva eliminada');
        fetchReservations();
      }
    }

    document.querySelectorAll('.btn-ghost[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.btn-ghost.active').classList.remove('active');
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderReservations();
      });
    });

    init();
  </script>
</body>
</html>
